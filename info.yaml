# Tiny Tapeout project information
project:
  title:        "Self-Timed Dual-Rail Pipeline Demo"
  author:       "Dalton Gaddy"
  discord:      ""  # optional
  description:  "Four-stage dual-rail self-timed pipeline (sync C-element model) with completion/violation outputs."
  language:     "Verilog"
  clock_hz:     100000  # 100 kHz used for the synchronous model (set to 0 if you plan to ignore clk)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_self_timed_sync_model"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]: "SEND_PULSE (rising edge injects token)"
  ui[1]: "DATA_BIT (0/1 encoded into dual-rail)"
  ui[2]: ""
  ui[3]: ""
  ui[4]: ""
  ui[5]: ""
  ui[6]: ""
  ui[7]: ""

  # Outputs
  uo[0]: "STAGE0_TOKEN_PRESENT"
  uo[1]: "STAGE1_TOKEN_PRESENT"
  uo[2]: "STAGE2_TOKEN_PRESENT"
  uo[3]: "STAGE3_TOKEN_PRESENT"
  uo[4]: "SEND_PULSE_MONITOR"
  uo[5]: "DUALRAIL_VIOLATION (any stage plus&minus)"
  uo[6]: "STAGE3_MINUS"
  uo[7]: "STAGE3_PLUS"

  # Bidirectional pins
  uio[0]: ""
  uio[1]: ""
  uio[2]: ""
  uio[3]: ""
  uio[4]: ""
  uio[5]: ""
  uio[6]: ""
  uio[7]: ""

# Do not change!
yaml_version: 6

